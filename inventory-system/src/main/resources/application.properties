# -----------------------------
# APPLICATION CONFIGURATION
# -----------------------------

# Admin Configuration
app.admin.email=admin@inventory.com
app.admin.password=admin123

# JWT Configuration
# IMPORTANT: The secret key must be at least 64 characters (512 bits) for HS512 algorithm
# Current key is 72 characters long - DO NOT CHANGE IN PRODUCTION
app.jwt.secret=mySecretKey123456789012345678901234567890123456789012345678901234567890ABCD
app.jwt.expiration=86400000

# Email Configuration
app.email.admin=admin@inventory.com

# Performance Configuration
spring.task.execution.pool.core-size=8
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-

# Logging Configuration
logging.level.com.inventory.inventory_system=INFO
logging.level.org.springframework.mail=WARN
logging.level.org.hibernate.SQL=WARN


# -----------------------------
# ACTUATOR CONFIGURATION
# -----------------------------

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized


# -----------------------------
# SWAGGER CONFIGURATION
# -----------------------------

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html